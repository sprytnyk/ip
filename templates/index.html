<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's My IP</title>
    <meta name="description" content="Check your IP address and location details instantly">

    <!-- Web App Manifest -->
    <link rel="manifest" href="/static/site.webmanifest">

    <!-- Favicons -->
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/static/favicon-16x16.png" sizes="16x16">
    <link rel="icon" type="image/png" href="/static/favicon-32x32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

    <!-- Meta Tags for App Branding -->
    <meta name="theme-color" content="#0f172a">
    <meta name="background-color" content="#0f172a">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
            color: #e2e8f0;
            line-height: 1.5;
        }

        .page {
            max-width: 42rem;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 5rem;
            height: 5rem;
            background-color: #2563eb;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .icon-box svg {
            width: 2.5rem;
            height: 2.5rem;
            color: #fff;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #94a3b8;
        }

        .card {
            background-color: #1e293b;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem;
            border: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background-color: rgba(51, 65, 85, 0.5);
            border-radius: 0.75rem;
            transition: background-color 0.15s ease;
        }

        .info-row:hover {
            background-color: #334155;
        }

        .row-icon {
            width: 3rem;
            height: 3rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .row-icon svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        .row-icon.blue { background-color: rgba(59, 130, 246, 0.2); }
        .row-icon.blue svg { color: #60a5fa; }

        .row-icon.emerald { background-color: rgba(16, 185, 129, 0.2); }
        .row-icon.emerald svg { color: #34d399; }

        .row-icon.purple { background-color: rgba(139, 92, 246, 0.2); }
        .row-icon.purple svg { color: #a78bfa; }

        .row-icon.amber { background-color: rgba(245, 158, 11, 0.2); }
        .row-icon.amber svg { color: #fbbf24; }

        .row-icon.rose { background-color: rgba(244, 63, 94, 0.2); }
        .row-icon.rose svg { color: #fb7185; }

        .row-content {
            flex: 1;
            min-width: 0;
        }

        .row-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        .row-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
        }

        .footer {
            text-align: center;
            font-size: 0.875rem;
            color: #94a3b8;
            line-height: 1.8;
        }

        .footer a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .footer a:hover {
            color: #93c5fd;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out;
        }

        @media screen and (max-width: 640px) {
            h1 { font-size: 2.25rem; }
            .card { padding: 1.25rem; }
            .row-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>What's My IP</h1>
        </div>

        <div class="card">
            <div class="info-list animate-fade-in">
                <!-- IP Address -->
                <div class="info-row">
                    <div class="row-icon blue">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="4" x2="20" y1="9" y2="9"></line>
                            <line x1="4" x2="20" y1="15" y2="15"></line>
                            <line x1="10" x2="8" y1="3" y2="21"></line>
                            <line x1="16" x2="14" y1="3" y2="21"></line>
                        </svg>
                    </div>
                    <div class="row-content">
                        <p class="row-label">IP Address</p>
                        <p class="row-value">{{ data.ip }}</p>
                    </div>
                </div>

                <!-- Country -->
                <div class="info-row">
                    <div class="row-icon emerald">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                            <line x1="4" x2="4" y1="22" y2="15"></line>
                        </svg>
                    </div>
                    <div class="row-content">
                        <p class="row-label">Country</p>
                        <p class="row-value">{{ data.country }} ({{ data.iso_code }})</p>
                    </div>
                </div>

                <!-- City -->
                <div class="info-row">
                    <div class="row-icon amber">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div class="row-content">
                        <p class="row-label">City</p>
                        <p class="row-value">{{ data.city }}</p>
                    </div>
                </div>

                <!-- Organisation -->
                <div class="info-row">
                    <div class="row-icon rose">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
                            <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
                            <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path>
                            <path d="M10 6h4"></path>
                            <path d="M10 10h4"></path>
                            <path d="M10 14h4"></path>
                            <path d="M10 18h4"></path>
                        </svg>
                    </div>
                    <div class="row-content">
                        <p class="row-label">Organisation</p>
                        <p class="row-value">{{ data.org }}</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Data provided by <a href="https://dev.maxmind.com/geoip/geolite2-free-geolocation-data/" target="_blank" rel="noopener noreferrer">MaxMind GeoIP2 Lite</a>.</p>
            <p>View the <a href="/docs" target="_blank" rel="noopener noreferrer">API Documentation</a>.</p>
            <p>Your data isn't collected. Check this <a href="https://github.com/sprytnyk/ip" target="_blank" rel="noopener noreferrer">GitHub repository</a>.</p>
        </div>
    </div>
</body>
</html>
