<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's my IP</title>

    <!-- Web App Manifest -->
    <link rel="manifest" href="/static/site.webmanifest">

    <!-- Favicons -->
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/static/favicon-16x16.png" sizes="16x16">
    <link rel="icon" type="image/png" href="/static/favicon-32x32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

    <!-- Meta Tags for App Branding -->
    <meta name="theme-color" content="#ffffff">
    <meta name="background-color" content="#ffffff">

    <style>
        /* General styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            color: #2d3748;
        }

        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 1.75rem;
            color: #2b6cb0;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table th, table td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        table th {
            background: #2b6cb0;
            color: #ffffff;
            font-weight: bold;
        }

        table tr:nth-child(odd) {
            background-color: #f7fafc;
        }

        table tr:nth-child(even) {
            background-color: #ffffff;
        }

        table tr:hover {
            background-color: #ebf8ff;
        }

        /* Footer styles */
        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: #4a5568;
            margin-top: 20px;
        }

        .footer a {
            color: #2b6cb0;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Mobile responsiveness */
        @media screen and (max-width: 768px) {
            table th, table td {
                font-size: 14px;
                padding: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What's my IP</h1>
        <table>
            <thead>
                <tr>
                    <th>Field</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>IP Address</td>
                    <td>{{ data.ip }}</td>
                </tr>
                <tr>
                    <td>Country</td>
                    <td>{{ data.country }}</td>
                </tr>
                <tr>
                    <td>City</td>
                    <td>{{ data.city }}</td>
                </tr>
                <tr>
                    <td>Organisation</td>
                    <td>{{ data.org }}</td>
                </tr>
            </tbody>
        </table>
        <div class="footer">
            Data provided by
            <a href="https://dev.maxmind.com/geoip/geolite2-free-geolocation-data/" target="_blank"
                rel="noopener noreferrer">MaxMind GeoIP2 Lite</a>.
            <br>
            View the
            <a href="/docs" target="_blank" rel="noopener noreferrer">API Documentation</a>.
            <br>
            Your data isn't collected. Check this
            <a href="https://github.com/sprytnyk/ip" target="_blank" rel="noopener noreferrer">GitHub repository</a>.
        </div>
        </div>
</body>
</html>
